<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>李雷与徐晓婉的专属旅程</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#874e58",
                        "primary-container": "#ffb6c1",
                        "surface": "#fbf9f1",
                        "on-surface": "#1b1c17",
                        "on-primary": "#ffffff"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Plus Jakarta Sans", "sans-serif"],
                        "handwriting": ["Caveat", "Ma Shan Zheng", "cursive"]
                    }
                }
            }
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #fbf9f1;
            color: #1b1c17;
        }
        .hero-bg {
            background: linear-gradient(-45deg, #fdf5e6, #fff3e0, #ffe4e1, #fed9b8);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        #carousel-inner {
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* 飘落花瓣动画 */
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
        .petal {
            position: absolute;
            top: -10%;
            background-color: #ffd9de;
            border-radius: 15px 0 15px 0;
            width: 14px;
            height: 14px;
            animation: fall linear infinite;
        }
</style>
</head>
<body class="hero-bg min-h-screen relative overflow-hidden flex flex-col justify-between items-center antialiased">

<nav class="fixed top-0 left-0 right-0 z-50 flex justify-between items-center px-8 py-3 max-w-6xl mx-auto rounded-full mt-4 mx-4 bg-white/70 backdrop-blur-xl shadow-sm text-sm font-medium">
    <div class="text-2xl font-bold italic text-pink-500">Our Journey</div>
    <ul class="flex gap-6 items-center">
        <li><a class="text-pink-600 border-b-2 border-pink-200 pb-1" href="map.html">旅行地图</a></li>
        <li><a class="text-stone-500 hover:text-pink-400 transition-colors" href="#">人生旅程</a></li>
        <li><a class="text-stone-500 hover:text-pink-400 transition-colors" href="#">照片画廊</a></li>
        <li><a class="text-stone-500 hover:text-pink-400 transition-colors" href="#">关于我们</a></li>
    </ul>
    <button class="text-pink-400 p-2 rounded-full hover:bg-stone-100 transition-colors">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">favorite</span>
    </button>
</nav>

<div class="absolute inset-0 pointer-events-none z-0">
    <div class="petal" style="left: 10%; animation-duration: 15s;"></div>
    <div class="petal" style="left: 30%; animation-duration: 22s; animation-delay: 2s;"></div>
    <div class="petal" style="left: 50%; animation-duration: 18s; animation-delay: 5s;"></div>
    <div class="petal" style="left: 70%; animation-duration: 25s; animation-delay: 1s;"></div>
    <div class="petal" style="left: 90%; animation-duration: 12s; animation-delay: 4s;"></div>
</div>

<main class="flex-grow flex flex-col items-center justify-center w-full z-10 px-4 relative mt-24 max-w-6xl mx-auto">
    
    <div class="absolute inset-0 w-full h-full overflow-hidden z-[-1] rounded-[3rem] shadow-2xl">
        <div class="flex w-full h-full" id="carousel-inner">
            <img alt="郑州回忆" class="w-full h-full object-cover flex-shrink-0" src="images/zhengzhou/home_1.jpg" onerror="this.src='https://images.unsplash.com/photo-1518599904199-0ca897819ddb?q=80&w=1000&auto=format&fit=crop'">
            <img alt="徐州回忆" class="w-full h-full object-cover flex-shrink-0" src="images/xuzhou/xuzhou-2604-01.jpg" onerror="this.src='https://images.unsplash.com/photo-1522673607200-164d1b6ce486?q=80&w=1000&auto=format&fit=crop'">
        </div>
        <div class="absolute inset-0 bg-black/30"></div> 
    </div>

    <div class="text-center flex flex-col items-center gap-6 max-w-2xl bg-white/70 backdrop-blur-md p-12 rounded-[3rem] shadow-xl border border-white/50 relative">
        <p class="font-handwriting text-4xl text-primary -rotate-2 -mb-4 opacity-90">Since 2026</p>
        <h1 class="font-headline text-5xl md:text-7xl font-extrabold bg-clip-text text-transparent bg-gradient-to-br from-primary to-primary-container">
            我们的专属回忆
        </h1>
        <p class="font-body text-lg text-stone-700 max-w-md mx-auto leading-relaxed mt-2 font-medium">
            每一张快照，每一张票根，每一个相伴的清晨。<br>这本纪念册，记录了成就我们的点点滴滴。
        </p>
        
        <button onclick="window.location.href='map.html'" class="mt-6 px-10 py-4 bg-primary text-white rounded-full font-bold text-lg shadow-lg hover:scale-105 transition-all duration-500 flex items-center gap-3 group relative overflow-hidden">
            <span class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/30 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000"></span>
            <span>开启回忆</span>
            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
        </button>
    </div>

    <div class="absolute inset-y-0 left-4 right-4 flex justify-between items-center pointer-events-none z-20">
        <button id="prev-btn" class="pointer-events-auto p-3 bg-white/40 backdrop-blur-md rounded-full text-stone-800 hover:bg-white/70 transition-colors shadow-lg">
            <span class="material-symbols-outlined">chevron_left</span>
        </button>
        <button id="next-btn" class="pointer-events-auto p-3 bg-white/40 backdrop-blur-md rounded-full text-stone-800 hover:bg-white/70 transition-colors shadow-lg">
            <span class="material-symbols-outlined">chevron_right</span>
        </button>
    </div>
</main>

<footer class="w-full py-12 px-6 flex flex-col items-center gap-6 bg-white/80 backdrop-blur-sm rounded-t-[3rem] mt-20 border-t border-white/20 z-10">
    <div class="text-lg font-semibold text-stone-800">Our Journey</div>
    <ul class="flex gap-6">
        <li><a class="text-sm italic text-stone-500 hover:text-pink-400" href="map.html">旅行地图</a></li>
        <li><a class="text-sm italic text-stone-500 hover:text-pink-400" href="#">人生旅程</a></li>
        <li><a class="text-sm italic text-stone-500 hover:text-pink-400" href="#">照片画廊</a></li>
    </ul>
    <p class="font-handwriting text-2xl text-pink-500 text-center mt-2">
        每一个瞬间都是命运的馈赠。用心浇筑，以爱封存。
    </p>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const carousel = document.getElementById('carousel-inner');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        let currentIndex = 0;
        const totalItems = carousel.children.length;

        const updateCarousel = () => {
            carousel.style.transform = `translateX(-${currentIndex * 100}%)`;
        };

        nextBtn.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % totalItems;
            updateCarousel();
        });

        prevBtn.addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + totalItems) % totalItems;
            updateCarousel();
        });

        // 自动轮播
        setInterval(() => {
            currentIndex = (currentIndex + 1) % totalItems;
            updateCarousel();
        }, 5000);
    });
</script>
</body>
</html>

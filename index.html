<!DOCTYPE html>

    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#874e58",
                        "primary-container": "#ffb6c1",
                        surface: "#fcfbf7",
                    },
                    fontFamily: {
                        headline: ["Plus Jakarta Sans", "sans-serif"],
                        handwriting: ["Ma Shan Zheng", "cursive"]
                    }
                }
            }
        }

    <style>
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #fcfbf7;
            overflow-x: hidden;
            /* 防止移动端下拉刷新时的白边 */
            overscroll-behavior-y: none; 
        }

        /* 背景柔和渐变 */
        .bg-gradient-soft {
            background: radial-gradient(circle at top right, #fff4e6 0%, #fcfbf7 40%),
                        radial-gradient(circle at bottom left, #fce7f3 0%, #fcfbf7 40%);
        }

        /* 轮播图平滑过渡 */
        #carousel-inner {
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- 全局灵动爱心与花瓣动画 --- */
        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0.6) rotate(-15deg); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1.4) rotate(25deg); opacity: 0; }
        }
        
        .anim-heart {
            position: absolute;
            animation: floatUp linear infinite;
            filter: drop-shadow(0 0 8px rgba(255, 182, 193, 0.6));
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            15% { opacity: 0.6; }
            85% { opacity: 0.4; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
        
        .anim-petal {
            position: absolute;
            top: -10%;
            border-radius: 15px 0 15px 0;
            animation: fall linear infinite;
        }
    </style>
</head>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const carousel = document.getElementById('carousel-inner');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        let currentIndex = 0;
        const totalItems = carousel.children.length;

        const updateCarousel = () => {
            // 使用 translate-x 搭配 CSS 的 transition 实现丝滑滑动
            carousel.style.transform = `translateX(-${currentIndex * 100}%)`;
        };

        nextBtn.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % totalItems;
            updateCarousel();
        });

        prevBtn.addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + totalItems) % totalItems;
            updateCarousel();
        });

        // 自动轮播：每 6 秒切换一次，给用户留足阅读文字的时间
        setInterval(() => {
            currentIndex = (currentIndex + 1) % totalItems;
            updateCarousel();
        }, 6000);
    });
</script>

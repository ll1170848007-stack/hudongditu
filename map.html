<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>我们的足迹 - 专属纪念</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-lite-webfont@1.1.0/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#874e58",
                        "primary-container": "#ffb6c1",
                        surface: "#fcfbf7",
                    },
                    fontFamily: {
                        headline: ["Quicksand", "LXGW WenKai Lite", "sans-serif"],
                        body: ["Quicksand", "LXGW WenKai Lite", "sans-serif"],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: "Quicksand", "LXGW WenKai Lite", sans-serif;
            background-color: #fcfbf7;
            overflow: hidden; /* 地图页通常固定高度 */
        }

        .bg-gradient-soft {
            background: radial-gradient(circle at top right, #fff4e6 0%, #fcfbf7 40%),
                        radial-gradient(circle at bottom left, #fce7f3 0%, #fcfbf7 40%);
        }

        /* 动画逻辑同步首页 */
        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0.6) rotate(-15deg); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1.4) rotate(25deg); opacity: 0; }
        }
        .anim-heart { position: absolute; animation: floatUp linear infinite; z-index: 100; pointer-events: none; }
        
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            15% { opacity: 0.6; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
        .anim-petal { position: absolute; top: -10%; border-radius: 15px 0 15px 0; animation: fall linear infinite; z-index: 100; pointer-events: none; }

        /* 地图容器样式 */
        #map-container { width: 100%; height: 100%; min-height: 500px; }
        
        /* 隐藏 ECharts 默认的高亮蓝边 */
        canvas { border-radius: 2rem; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ffb6c1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gradient-soft min-h-screen relative flex flex-col antialiased">

<div class="fixed inset-0 pointer-events-none z-[100] overflow-hidden">
    <div class="anim-petal bg-pink-200 w-3 h-3" style="left: 20%; animation-duration: 15s;"></div>
    <div class="anim-petal bg-rose-300 w-4 h-4" style="left: 60%; animation-duration: 20s; animation-delay: 3s;"></div>
    <span class="material-symbols-outlined anim-heart text-pink-400 text-2xl" style="left: 15%; animation-duration: 14s; font-variation-settings: 'FILL' 1;">favorite</span>
    <span class="material-symbols-outlined anim-heart text-pink-200 text-4xl" style="left: 75%; animation-duration: 22s; animation-delay: 5s; font-variation-settings: 'FILL' 1;">favorite</span>
</div>

<nav class="fixed top-0 left-0 right-0 z-50 flex justify-between items-center px-6 md:px-12 py-4 max-w-7xl mx-auto bg-surface/80 backdrop-blur-md">
    <div class="text-2xl font-bold text-pink-500 tracking-wider">我们的回忆</div>
    <ul class="hidden md:flex gap-8 items-center absolute left-1/2 transform -translate-x-1/2 font-medium text-stone-500 text-[15px]">
        <li><a class="hover:text-pink-400 transition-colors" href="index.html">首页</a></li>
        <li><a class="text-pink-600 font-bold" href="map.html">旅行地图</a></li>
        <li><a class="hover:text-pink-400 transition-colors" href="timeline.html">人生旅程</a></li>
        <li><a class="hover:text-pink-400 transition-colors" href="#">关于我们</a></li>
    </ul>
    <button class="text-pink-400 animate-pulse"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">favorite</span></button>
</nav>

<main class="flex-grow w-full max-w-7xl mx-auto px-4 md:px-8 pt-24 pb-6 grid grid-cols-1 lg:grid-cols-12 gap-6 h-[calc(100vh-2rem)]">
    
    <section class="lg:col-span-8 flex flex-col gap-4 h-full">
        <div class="bg-white/60 backdrop-blur-2xl rounded-[2.5rem] border border-white/60 p-4 md:p-6 shadow-[0_20px_50px_rgba(135,78,88,0.1)] relative flex-grow overflow-hidden">
            <button id="back-btn" class="absolute top-6 left-6 z-[101] hidden bg-white/80 hover:bg-pink-500 hover:text-white px-5 py-2 rounded-full font-bold text-sm shadow-sm transition-all flex items-center gap-2 text-stone-700">
                <span class="material-symbols-outlined text-sm">arrow_back</span> 返回全国
            </button>
            
            <div id="map-container"></div>
        </div>
    </section>

    <aside class="lg:col-span-4 flex flex-col gap-4 h-full overflow-hidden">
        <div class="bg-white/70 backdrop-blur-2xl rounded-[2.5rem] border border-white/60 p-6 shadow-xl flex flex-col h-full">
            <h2 id="sidebar-title" class="text-2xl font-bold text-stone-800 mb-6 flex items-center gap-2">
                <span class="material-symbols-outlined text-pink-400">auto_awesome</span>
                <span>最近的回忆</span>
            </h2>
            
            <div id="sidebar-content" class="flex-grow overflow-y-auto custom-scrollbar pr-2 space-y-6">
                </div>
        </div>
    </aside>
</main>

<nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md rounded-full px-4 py-2 bg-white/95 backdrop-blur-2xl shadow-lg flex justify-around items-center z-50 md:hidden border border-stone-100">
    <a href="index.html" class="flex flex-col items-center justify-center text-stone-500 w-12 h-12 hover:bg-stone-50 rounded-full"><span class="material-symbols-outlined">home</span><span class="text-[10px] mt-1">首页</span></a>
    <a href="map.html" class="flex flex-col items-center justify-center bg-[#8a5a63] text-white rounded-full w-12 h-12 scale-110 shadow-md"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">explore</span><span class="text-[10px] mt-1">地图</span></a>
    <a href="timeline.html" class="flex flex-col items-center justify-center text-stone-500 w-12 h-12 hover:bg-stone-50 rounded-full"><span class="material-symbols-outlined">auto_stories</span><span class="text-[10px] mt-1">旅程</span></a>
    <a href="#" class="flex flex-col items-center justify-center text-stone-500 w-12 h-12 hover:bg-stone-50 rounded-full"><span class="material-symbols-outlined">photo_library</span><span class="text-[10px] mt-1">画廊</span></a>
</nav>

<script>
    // 数据配置保持不变
    const globalTravelData = [
        {
            province: "河南",
            cities: [
                {
                    cityName: "郑州",
                    spots: [
                        { location: "世贸大厦B座附近", date: "2026-02", story: "在这里安顿了下来，通勤也很方便。这片区域见证了我们很多平淡又温馨的日常。", photos: ["images/zhengzhou/home_1.jpg"] }
                    ]
                }
            ]
        },
        {
            province: "江苏",
            cities: [
                {
                    cityName: "徐州",
                    spots: [
                        { location: "苏宁广场与周边打卡", date: "2026-04", story: "在这里打卡了超多美食，这座城市留下了很棒的味蕾回忆。无论是烧烤还是高铁风景，都很珍贵。", photos: ["images/xuzhou/xuzhou-2604-01.jpg"] }
                    ]
                }
            ]
        }
    ];

    const myChart = echarts.init(document.getElementById('map-container'));
    const backBtn = document.getElementById('back-btn');
    const sidebarContent = document.getElementById('sidebar-content');
    const sidebarTitle = document.getElementById('sidebar-title');
    let currentLevel = 'china';

    async function renderMap(mapName, mapKey) {
        try {
            let url = mapKey === 'china' 
                ? `https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/json/china.json` 
                : `https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/json/province/${mapKey}.json`;
            const response = await fetch(url);
            const geoJson = await response.json();
            echarts.registerMap(mapName, geoJson);

            const option = {
                tooltip: { 
                    trigger: 'item', 
                    formatter: '{b}',
                    backgroundColor: 'rgba(255, 255, 255, 0.9)',
                    borderColor: '#ffb6c1',
                    textStyle: { color: '#874e58', fontWeight: 'bold', fontFamily: 'LXGW WenKai Lite' }
                },
                series: [{
                    type: 'map', map: mapName, roam: true, scaleLimit: { min: 1, max: 6 },
                    itemStyle: { 
                        areaColor: '#fff9f9', 
                        borderColor: '#ffccd5', 
                        borderWidth: 2, // 增加边框感
                        shadowColor: 'rgba(135, 78, 88, 0.05)',
                        shadowBlur: 10
                    },
                    emphasis: { 
                        itemStyle: { areaColor: '#ffedf0', borderWidth: 3 },
                        label: { show: true, color: '#874e58', fontWeight: 'bold' }
                    },
                    data: globalTravelData.map(d => ({ name: d.province, itemStyle: { areaColor: '#ffccd5' } }))
                }]
            };
            myChart.setOption(option);
        } catch (e) { console.error(e); }
    }

    function renderSidebar(spots, title = "最近的回忆") {
        sidebarTitle.innerHTML = `<span class="material-symbols-outlined text-pink-400">auto_awesome</span><span>${title}</span>`;
        sidebarContent.innerHTML = spots.length ? spots.map((s, i) => `
            <div class="bg-white/50 p-4 rounded-3xl border border-pink-100 shadow-sm hover:scale-[1.02] transition-transform animate-in fade-in slide-in-from-right duration-500" style="animation-delay: ${i*100}ms">
                <img src="${s.photos[0]}" class="w-full h-32 object-cover rounded-2xl mb-3 shadow-inner" onerror="this.src='https://picsum.photos/400/200?random=${i}'">
                <h4 class="font-bold text-stone-800 text-lg mb-1">📍 ${s.location}</h4>
                <p class="text-xs text-pink-500 font-bold mb-2 underline decoration-pink-200 underline-offset-4">${s.date}</p>
                <p class="text-sm text-stone-600 leading-relaxed">${s.story}</p>
            </div>
        `).join('') : `<div class="text-center py-20 text-stone-400">点击地图城市查看回忆~</div>`;
    }

    renderMap('china', 'china');
    // 初始加载所有回忆
    const allSpots = []; globalTravelData.forEach(p => p.cities.forEach(c => allSpots.push(...c.spots)));
    renderSidebar(allSpots);

    myChart.on('click', function (params) {
        if (currentLevel === 'china') {
            const provincePinyinMap = { '河南': 'henan', '江苏': 'jiangsu' };
            if (provincePinyinMap[params.name]) {
                currentLevel = 'province';
                renderMap(params.name, provincePinyinMap[params.name]);
                backBtn.style.display = 'flex';
            }
        } else {
            const cityName = params.name.replace(/(市|县|区)$/, '');
            let spots = [];
            globalTravelData.forEach(p => p.cities.forEach(c => { if(c.cityName === cityName) spots = c.spots }));
            renderSidebar(spots, `${cityName} 的回忆`);
        }
    });

    backBtn.onclick = () => {
        currentLevel = 'china'; renderMap('china', 'china');
        backBtn.style.display = 'none'; renderSidebar(allSpots);
    };

    window.onresize = () => myChart.resize();
</script>
</body>
</html>
